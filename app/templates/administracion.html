{% extends "base.html" %}

{% block contenido %}
<div class="admin-grid">
    <div class="form-container">
        <h2>👤 Nuevo Usuario</h2>
        <form id="usuarioForm">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" name="email" required>
            </div>
            <button type="submit">Registrar</button>
        </form>
    </div>

    <div class="form-container">
        <h2>🏷️ Nueva Categoría</h2>
        <form id="categoriaForm">
            <div class="form-group">
                <label>Nombre de Categoría</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" name="descripcion" required>
            </div>
            <button type="submit">Crear Categoría</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('usuarioForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(this));
        fetch('/api/usuarios', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(() => { alert('Usuario creado'); this.reset(); });
    });

    document.getElementById('categoriaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(this));
        fetch('/api/categorias', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(() => { alert('Categoría creada'); this.reset(); });
    });
</script>
{% endblock %}
